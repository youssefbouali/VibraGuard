apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain-service
  namespace: vibraguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blockchain-service
  template:
    metadata:
      labels:
        app: blockchain-service
    spec:
      containers:
      - name: blockchain-service
        image: vibraguard/blockchain-service:latest
        ports:
        - containerPort: 8082
        env:
        - name: BLOCKCHAIN_NODE_URL
          valueFrom:
            secretKeyRef:
              name: blockchain-secrets
              key: node-url
---
apiVersion: v1
kind: Service
metadata:
  name: blockchain-service
  namespace: vibraguard
spec:
  selector:
    app: blockchain-service
  ports:
  - port: 8082
    targetPort: 8082
