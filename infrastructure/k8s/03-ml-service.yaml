apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: vibraguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
      - name: ml-service
        image: vibraguard/ml-service:latest
        ports:
        - containerPort: 5000
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: vibraguard
spec:
  selector:
    app: ml-service
  ports:
  - port: 5000
    targetPort: 5000
