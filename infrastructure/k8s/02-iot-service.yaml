apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-service
  namespace: vibraguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iot-service
  template:
    metadata:
      labels:
        app: iot-service
    spec:
      containers:
      - name: iot-service
        image: vibraguard/iot-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service:9092"
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: iot-service
  namespace: vibraguard
spec:
  selector:
    app: iot-service
  ports:
  - port: 8081
    targetPort: 8081
