server:
  port: 8088

spring:
  application:
    name: bi-service
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@oracle-db.vibraguard.svc.cluster.local:1521:xe}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME:system}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

motor-service:
  url: ${MOTOR_SERVICE_URL:http://motor-service.vibraguard.svc.cluster.local:8082}

alert-service:
  url: ${ALERT_SERVICE_URL:http://alert-service.vibraguard.svc.cluster.local:8083}
