server:
  port: 8080

spring:
  application:
    name: api-gateway
  codec:
    max-in-memory-size: 50MB
  datasource:
    url: jdbc:h2:mem:testdb;NON_KEYWORDS=VALUE,MONTH
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  data:
    mongodb:
      uri: mongodb://localhost:27017/test
  elasticsearch:
    uris: http://localhost:9200

de:
  flapdoodle:
    mongodb:
      embedded:
        version: "5.0.14"

# IPFS Configuration
ipfs:
  api:
    url: http://localhost:5001

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
