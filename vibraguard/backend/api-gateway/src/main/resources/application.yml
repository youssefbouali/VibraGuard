server:
  port: 8080

spring:
  application:
    name: api-gateway
  codec:
    max-in-memory-size: 50MB
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@oracle-db.vibraguard.svc.cluster.local:1521:xe}
    driver-class-name: oracle.jdbc.OracleDriver
    username: ${DB_USERNAME:system}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        connection:
          provider_disables_autocommit: true
    defer-datasource-initialization: true
  data:
    mongodb:
      uri: ${MONGO_URL:mongodb://mongodb.vibraguard.svc.cluster.local:27017/vibraguard}
  elasticsearch:
    uris: ${ELASTICSEARCH_URL:http://elasticsearch-master.vibraguard.svc.cluster.local:9200}
    connection-timeout: 5s
    socket-timeout: 30s
  main:
    lazy-initialization: true

# IPFS Configuration
ipfs:
  api:
    url: ${IPFS_API_URL:http://ipfs:5001}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${JAEGER_ENDPOINT:http://jaeger:4318/v1/traces}
