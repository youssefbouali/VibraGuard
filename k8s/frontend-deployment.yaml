apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: vibraguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: vibraguard-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: "http://backend:80"
