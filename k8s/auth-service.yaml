apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: vibraguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: vibraguard-auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: DB_URL
              value: "jdbc:oracle:thin:@oracle-db.vibraguard.svc.cluster.local:1521:xe"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: oracle-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oracle-db-credentials
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: vibraguard
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
