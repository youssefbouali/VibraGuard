codecov:
  require:
    - change
    - patch
    - project

coverage:
  precision: 2
  round: down
  range:
    - 70
    - 100

ignore:
  - "node_modules"
  - "dist"
  - "build"
  - "coverage"
  - "test"
  - "tests"
  - "**/*.test.ts"
  - "**/*.test.js"
  - "**/*.spec.ts"
  - "**/*.spec.js"

comment:
  layout: "reach,diff,files,footer"
  behavior: default
  require_changes: false

flags:
  backend:
    carryforward: true
  frontend:
    carryforward: true
  blockchain:
    carryforward: true
  python:
    carryforward: true
