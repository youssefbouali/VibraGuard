apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vibraguard-ingress
  namespace: vibraguard
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api.vibraguard.local
    http:
      paths:
      - path: /api/v1/iot
        pathType: Prefix
        backend:
          service:
            name: iot-service
            port:
              number: 8081
      - path: /api/v1/ml
        pathType: Prefix
        backend:
          service:
            name: ml-service
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80
