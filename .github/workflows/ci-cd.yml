name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  all-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, blockchain-tests, python-tests]
    if: always()
    
    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.backend-tests.result }}" != "success" ] || \
           [ "${{ needs.frontend-tests.result }}" != "success" ] || \
           [ "${{ needs.blockchain-tests.result }}" != "success" ] || \
           [ "${{ needs.python-tests.result }}" != "success" ]; then
          echo "One or more test suites failed"
          exit 1
        fi
        echo "All test suites passed!"
    
    - name: Create test summary
      run: echo "✅ All tests completed successfully"

  backend-tests:
    uses: ./.github/workflows/backend-tests.yml

  frontend-tests:
    uses: ./.github/workflows/frontend-tests.yml

  blockchain-tests:
    uses: ./.github/workflows/blockchain-tests.yml

  python-tests:
    uses: ./.github/workflows/python-tests.yml

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run security checks
      run: |
        echo "Running security analysis..."
        # Add security scanning tools as needed
        # Examples: npm audit, pip-audit, semgrep, etc.
