name: Build and Deploy

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Build Backend
      run: |
        cd vibraguard/backend
        mvn clean package -DskipTests
    
    - name: Build Frontend
      run: |
        cd vibraguard/frontend
        npm install
        npm run build
    
    - name: Build Blockchain
      run: |
        cd vibraguard/blockchain-net
        npm install
        npx hardhat compile
    
    - name: Archive Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: |
          vibraguard/backend/api-gateway/target/*.jar
          vibraguard/frontend/dist/
          vibraguard/blockchain-net/artifacts/
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          vibraguard/backend/api-gateway/target/*.jar
        draft: false
        prerelease: false
