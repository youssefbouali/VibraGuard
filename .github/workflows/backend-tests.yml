name: Backend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'vibraguard/backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'vibraguard/backend/**'
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: ['17']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven
    
    - name: Run Maven Tests
      run: mvn -B clean test -f vibraguard/backend/pom.xml
    
    - name: Generate JaCoCo Coverage Report
      run: mvn -B jacoco:report -f vibraguard/backend/pom.xml
      continue-on-error: true
    
    - name: Display JaCoCo Report Summary
      if: always()
      run: |
        echo "📊 JaCoCo Coverage Report:"
        if [ -f vibraguard/backend/target/site/jacoco/index.html ]; then
          echo "✅ Report generated at: vibraguard/backend/target/site/jacoco/index.html"
        fi
    
    - name: Upload JaCoCo Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./vibraguard/backend/target/site/jacoco/jacoco.xml
        flags: backend,jacoco
        name: backend-jacoco-coverage
        fail_ci_if_error: false
      continue-on-error: true
    
    - name: Archive Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results
        path: vibraguard/backend/target/surefire-reports/
        retention-days: 7
    
    - name: Archive JaCoCo Coverage Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-jacoco-coverage-report
        path: vibraguard/backend/target/site/jacoco/
        retention-days: 30
